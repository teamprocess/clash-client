name: Status Deploy (Draft)

on:
  push:
    branches:
      - main
    paths:
      - "apps/status/**"

permissions:
  contents: read

jobs:
  deploy-status:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build status app
        run: pnpm --filter @clash/status build

